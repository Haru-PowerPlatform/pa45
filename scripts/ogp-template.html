<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'NotoSansJP';
    src: url('file:///C:/Windows/Fonts/NotoSansJP-VF.ttf') format('truetype');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'NotoSansJP', 'Meiryo', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #1a3a8f 0%, #2563eb 55%, #60a5fa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 28px;
    width: 1160px;
    height: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 44px 64px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.28);
  }
  .label-pill {
    background: linear-gradient(90deg, #1a3a8f, #2563eb);
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    padding: 14px 52px;
    border-radius: 60px;
    margin-bottom: 40px;
    text-align: center;
    line-height: 1.55;
    letter-spacing: .02em;
  }
  .label-pill .sub {
    font-size: 24px;
    font-weight: 500;
    display: block;
    opacity: .9;
  }
  .body-row {
    display: flex;
    align-items: center;
    gap: 52px;
    width: 100%;
  }
  .avatar {
    width: 190px;
    height: 190px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 5px solid #dbeafe;
  }
  .title {
    font-size: 64px;
    font-weight: 900;
    color: #0f172a;
    line-height: 1.28;
    flex: 1;
    letter-spacing: -.01em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label-pill" id="label">
    社外コミュニティ活動
    <span class="sub" id="sub">Power Automate 45</span>
  </div>
  <div class="body-row">
    <img class="avatar" src="file:///C:/Users/isamu/OneDrive/ドキュメント/GitHub/pa45/assets/img/haru-avatar.png" alt="Haru">
    <div class="title" id="title">Power Automateの<br>最初の壁"変数"を<br>45分で超えてみる講座</div>
  </div>
</div>
</body>
</html>
