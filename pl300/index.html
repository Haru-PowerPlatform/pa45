<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#1e40af">
<title>PL-300 暗記カード | はる専用</title>
<meta name="description" content="PL-300（Power BI Data Analyst）試験対策の暗記カードサイト。間違えやすい問題と反射パターンをまとめた完全カスタム版。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--panel:#1e293b;--card:#334155;--card-back:linear-gradient(135deg,#1e3a8a,#7c3aed);
  --text:#f1f5f9;--muted:#94a3b8;--accent:#60a5fa;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --radius:14px;--shadow:0 4px 20px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-text-size-adjust:100%;min-height:100vh;padding-bottom:80px}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
header{padding:24px 16px;text-align:center;background:linear-gradient(135deg,#1e3a8a 0%,#7c3aed 100%);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow)}
header h1{font-size:clamp(1.4rem,5vw,2rem);margin-bottom:6px;font-weight:700}
header p{font-size:.9rem;opacity:.9}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--panel);padding:14px 8px;border-radius:var(--radius);text-align:center;border:1px solid #334155}
.stat .num{font-size:clamp(1.4rem,5vw,2rem);font-weight:700;color:var(--accent);display:block}
.stat .lbl{font-size:.75rem;color:var(--muted);margin-top:2px}

.controls{position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:10;border-bottom:1px solid #334155;margin-bottom:16px}
.search{width:100%;padding:12px 14px;border:1px solid #475569;border-radius:10px;background:var(--panel);color:var(--text);font-size:1rem;margin-bottom:10px}
.search:focus{outline:2px solid var(--accent)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.filter{padding:6px 12px;border:1px solid #475569;border-radius:20px;background:var(--panel);color:var(--text);cursor:pointer;font-size:.8rem;transition:all .2s;-webkit-tap-highlight-color:transparent}
.filter.active{background:var(--accent);color:#0f172a;border-color:var(--accent);font-weight:600}
.filter:active{transform:scale(.95)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{perspective:1000px;height:240px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.card.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);padding:18px;display:flex;flex-direction:column;box-shadow:var(--shadow);overflow-y:auto}
.front{background:var(--card);border:2px solid #475569}
.back{background:var(--card-back);transform:rotateY(180deg);font-size:.88rem}
.lvl{display:inline-block;font-size:.65rem;padding:3px 8px;border-radius:10px;font-weight:700;margin-bottom:6px;letter-spacing:.05em;align-self:flex-start}
.lvl-4{background:var(--danger);color:#fff}
.lvl-3{background:var(--warn);color:#0f172a}
.lvl-2{background:#3b82f6;color:#fff}
.lvl-1{background:var(--success);color:#fff}
.cat{display:inline-block;font-size:.65rem;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.15);margin-bottom:6px;align-self:flex-start;margin-left:6px}
.q{font-weight:700;font-size:1rem;margin:6px 0 8px;color:var(--text);flex:0 0 auto}
.hint{font-size:.78rem;color:var(--muted);margin-top:auto;text-align:right}
.mark-btn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.3);color:#94a3b8;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;z-index:5;transition:all .15s}
.mark-btn:active{transform:scale(.85)}
.mark-btn.marked{background:#f59e0b;border-color:#f59e0b;color:#0f172a}
.card.is-marked .front{border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.4),var(--shadow)}
.a-title{font-weight:700;margin-bottom:6px;font-size:.95rem;color:#fde68a}
.a-body{flex:1}
.a-body strong{color:#fde68a}
table{width:100%;border-collapse:collapse;margin:6px 0;font-size:.78rem}
table td,table th{padding:4px 6px;border:1px solid rgba(255,255,255,.2);text-align:left}
table th{background:rgba(0,0,0,.2)}
.no-result{text-align:center;color:var(--muted);padding:40px 20px;grid-column:1/-1}

footer{text-align:center;padding:20px;color:var(--muted);font-size:.75rem;margin-top:30px}
footer a{color:var(--accent);text-decoration:none}

.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0f172a;border:none;font-size:1.5rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:20}
.fab:active{transform:scale(.92)}

@media(max-width:480px){
  .cards{grid-template-columns:1fr}
  .card{height:auto;min-height:200px}
  .card-inner{position:relative;height:100%}
  .face{position:relative;height:auto;min-height:200px}
  .back{position:absolute;top:0}
}

@media(prefers-reduced-motion:reduce){
  .card-inner{transition:none}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>📘 PL-300 暗記カード</h1>
  <p>はる専用 / Power BI Data Analyst 試験対策</p>
</header>

<div class="stats">
  <div class="stat"><span class="num" id="total">0</span><span class="lbl">総カード数</span></div>
  <div class="stat"><span class="num" id="critical">0</span><span class="lbl">最重要🚨</span></div>
  <div class="stat"><span class="num" id="markedCount">0</span><span class="lbl">📌 マーク済み</span></div>
</div>

<div class="controls">
  <input id="search" class="search" type="search" placeholder="🔍 キーワード検索（例：DAX, RLS, ALL）">
  <div class="filters" id="filters">
    <button class="filter active" data-filter="all">全て</button>
    <button class="filter" data-filter="marked">📌 マーク済み</button>
    <button class="filter" data-filter="critical">🚨 最重要</button>
    <button class="filter" data-filter="DAX">DAX</button>
    <button class="filter" data-filter="モデル">モデル</button>
    <button class="filter" data-filter="PowerQuery">Power Query</button>
    <button class="filter" data-filter="セキュリティ">セキュリティ</button>
    <button class="filter" data-filter="配布">配布・管理</button>
    <button class="filter" data-filter="視覚化">視覚化</button>
  </div>
</div>

<div class="cards" id="cards"></div>

<footer>
  <p>更新日: 2026-05-10（107問目まで） / カードをタップで答え表示</p>
  <p><a href="https://github.com/Haru-PowerPlatform/pa45/blob/main/docs/pl300-mistakes.md" target="_blank">📝 ミス記録の元データ</a></p>
</footer>

</div>

<button class="fab" id="shuffle" title="シャッフル">🔀</button>

<script>
const data = [
  // 🚨 最重要（4回以上ミス）
  {lvl:4,cat:"PowerQuery",critical:true,q:"変換ロジックの一元管理・元データソースへのアクセス制限",a:"<strong>Power BI データフロー</strong>",body:"<table><tr><th>レイヤー</th><th>機能</th></tr><tr><td>変換層(ETL)</td><td><strong>データフロー</strong></td></tr><tr><td>モデル層</td><td>共有データセット</td></tr><tr><td>レポート層</td><td>アプリ/.pbit</td></tr></table>「変換ロジック・Power Query再利用」キーワードで反射。<strong>4回ミスの最重要項目。</strong>"},
  {lvl:4,cat:"DAX",critical:true,q:"全国合計に対する割合 vs 表示中合計に対する割合",a:"<strong>ALL vs ALLSELECTED</strong>",body:"・「全国・全体・総〇〇」→ <strong>ALL</strong>（全フィルター解除）<br>・「表示中・選択範囲」→ <strong>ALLSELECTED</strong>（スライサー尊重）<br><br>例：スライサーで東京選択時<br>ALL → 全国合計が分母<br>ALLSELECTED → 東京だけ＝100%<br><br><strong>4回ミスの最重要項目。</strong>"},

  // 🟠 3回ミス
  {lvl:3,cat:"モデル",critical:true,q:"OrderDate / ShipDate / DueDate を独立して期間分析",a:"<strong>非アクティブ + USERELATIONSHIP</strong>",body:"・Dateテーブルは1つだけ作る<br>・1本アクティブ、残り2本は<strong>非アクティブ</strong>リレーション<br>・DAXで <code>USERELATIONSHIP</code> 切り替え<br><br>「1つのDateテーブル」「複数の日付列」がキーワード。"},
  {lvl:3,cat:"モデル",q:"粒度違いテーブルのリレーション（日次vs月次）",a:"<strong>計算列で粒度を揃えて1対多</strong>",body:"多対多はほぼ罠。<br>例：日次の売上と月次の予算 → 売上側に「年月」計算列を作って予算と1対多。<br><br><strong>3回ミスの頻出パターン（CS③-Q5）。</strong>"},
  {lvl:3,cat:"セキュリティ",q:"RLS（行レベルセキュリティ）の実装手順",a:"<strong>定義=Desktop / 割り当て=Service</strong>",body:"<table><tr><th>場所</th><th>役割</th></tr><tr><td>Desktop</td><td>ロール定義（DAX式）</td></tr><tr><td>Service</td><td>ユーザー割り当て</td></tr></table>テストは Desktop の「ロールとして表示」。<br><br><strong>3回ミス（Q65・ランダム②・新問28）。</strong>"},

  // 🟡 2回ミス
  {lvl:2,cat:"配布",q:"開発・テスト・本番の3環境管理・昇格",a:"<strong>展開パイプライン</strong>",body:"3つのステージ間でレポート・データセット・データフローを昇格。Premium機能。"},
  {lvl:2,cat:"PowerQuery",q:"インポートデータ量を減らしたい",a:"<strong>Power Query（上流）でフィルター</strong>",body:"レポートフィルター・DAX FILTER は全データロード後の表示制御にすぎない。<br>Power Queryのフィルターは<strong>取得時点で削減</strong>される。"},
  {lvl:2,cat:"セキュリティ",q:"Build vs Read 権限の違い",a:"<strong>Read=閲覧のみ / Build=新規レポート作成可</strong>",body:"Build権限は「データセットを使って新しいレポートを作る」許可。共有データセットでは必須。"},
  {lvl:2,cat:"セキュリティ",q:"レポートのエクスポート禁止設定",a:"<strong>Desktop と Service の両方</strong>を変更",body:"Desktop のレポート設定 ＋ Service のテナント設定。<strong>片方だけだと有効にならない。</strong>"},
  {lvl:2,cat:"モデル",q:"役割別日付テーブル（Role-playing dimension）",a:"<strong>Dateテーブルを複製して別名で使う</strong>",body:"OrderDateテーブル / ShipDateテーブルなど、それぞれ独立したDateテーブルとして配置。"},

  // DAX タイムインテリジェンス
  {lvl:2,cat:"DAX",q:"前年同月比（YoY）",a:"<strong>SAMEPERIODLASTYEAR</strong>",body:"<code>CALCULATE(SUM(Sales[Amount]), SAMEPERIODLASTYEAR(Date[Date]))</code><br>PARALLELPERIOD・PREVIOUSYEAR は罠。同<strong>期間</strong>比較にならない。"},
  {lvl:2,cat:"DAX",q:"年初から今日まで累計",a:"<strong>TOTALYTD</strong>",body:"年累計=TOTALYTD / 四半期累計=TOTALQTD / 月累計=TOTALMTD<br>「〇〇累計」→ TOTAL〇〇 で反射。"},
  {lvl:2,cat:"DAX",q:"任意起点から過去Nヶ月遡る（ローリング）",a:"<strong>DATESINPERIOD</strong>",body:"読み方：デイツ・イン・ピリオド<br><code>DATESINPERIOD(Date[Date], LASTDATE(Date[Date]), -12, MONTH)</code><br>「N日/Nヶ月/N年遡って」「ローリング」キーワード。"},
  {lvl:2,cat:"DAX",q:"行ごとに掛け算/割り算してから合計",a:"<strong>SUMX</strong>",body:"<code>SUMX(Sales, Sales[Qty] * Sales[Price])</code><br>SUM = 1列をそのまま足す（速い）<br>SUMX = 行ごとに式評価して足す（柔軟・遅い）"},
  {lvl:2,cat:"DAX",q:"製品ごとに最新の有効データの値を取りたい",a:"<strong>LASTNONBLANK</strong>",body:"在庫スナップショット・期末残高の定番。LASTDATEは空白でも日付を返す。"},
  {lvl:2,cat:"DAX",q:"1列だけフィルター解除（他は残す）",a:"<strong>ALL(列名)</strong>",body:"・ALL(列名) = ピンポイント解除<br>・ALL(テーブル) = テーブル全列<br>・REMOVEFILTERS() = モデル全体（やりすぎ）"},
  {lvl:2,cat:"DAX",q:"上位N件を抽出して集計",a:"<strong>TOPN + ALL</strong>",body:"<code>CALCULATE(SUM(...), TOPN(10, ALL(Product), [売上]))</code><br>ALLで全体から、TOPNで上位N件を切り出す。"},
  {lvl:1,cat:"DAX",q:"#DIV/0! エラーを防ぐ割り算",a:"<strong>DIVIDE関数</strong>",body:"<code>DIVIDE(分子, 分母, 代替値)</code><br>分母が0/空白なら自動で代替値（既定はBLANK）を返す。"},

  // モデル
  {lvl:2,cat:"モデル",q:"タイムインテリジェンス関数が動かない原因",a:"<strong>「日付テーブルとしてマーク」未設定</strong>",body:"・AUTO DATE/TIME OFF<br>・カスタムDateテーブル<br>・<strong>「日付テーブルとしてマーク」</strong> がベストプラクティス"},
  {lvl:2,cat:"モデル",q:"Auto Date/Time（自動の日付/時刻）",a:"<strong>オフ推奨</strong>",body:"日付列ごとに隠しテーブルが自動生成されてファイルサイズが膨れる。<br>「ファイル → オプション → 現在のファイル → データ読み込み」でオフ。"},

  // Power Query
  {lvl:2,cat:"PowerQuery",q:"JSON・Record型の列を表形式に展開",a:"<strong>列の展開（Expand）</strong>",body:"「列の分割」はテキストを区切り文字で切る別物。JSONの構造を理解しない。"},
  {lvl:2,cat:"PowerQuery",q:"同じ構造のテーブルを縦に結合",a:"<strong>追加（Append）</strong>",body:"SQLの UNION 相当。月別売上テーブルを年間にまとめる時など。"},
  {lvl:2,cat:"PowerQuery",q:"キーで結合して列を横に追加",a:"<strong>マージ（Merge）</strong>",body:"SQLの JOIN 相当。マスタ情報を取り込む時など。"},
  {lvl:2,cat:"PowerQuery",q:"サービス上で接続先を切り替えたい",a:"<strong>Power Queryパラメーター</strong>",body:"展開パイプラインはコンテンツ昇格用で接続切替ではない。"},
  {lvl:1,cat:"PowerQuery",q:"列名変更後にエラー「列が見つかりません」",a:"<strong>列名のハードコード問題</strong>",body:"Power Queryのステップは<strong>列名を文字列でハードコード</strong>する。<br>上流で列名を変えても下流のM式は自動連鎖しない。"},

  // 視覚化
  {lvl:2,cat:"視覚化",q:"別ページに飛ぶ + フィルター引き継ぎ",a:"<strong>ドリルスルー</strong>",body:"右クリック → ドリルスルー → 詳細ページへ。クリックした行のフィルターが自動で持ち込まれる。"},
  {lvl:2,cat:"視覚化",q:"同じグラフで階層を掘る（年→月→日）",a:"<strong>ドリルダウン</strong>",body:"ページは変わらず同じビジュアルが細かくなる。Google Mapsのズーム的イメージ。"},
  {lvl:2,cat:"視覚化",q:"複数ビジュアルの表示/非表示・グループ管理",a:"<strong>選択ペイン（Selection Pane）</strong>",body:"PowerPointのレイヤーパネル相当。目のアイコンで表示/非表示。Ctrl+Gでグループ化。<br>ブックマークは<strong>状態のスナップショット保存</strong>用で別物。"},
  {lvl:2,cat:"視覚化",q:"クリックしたビジュアルが他に影響を与えないように",a:"<strong>相互作用を編集</strong>",body:"書式設定 → 相互作用を編集 → 「フィルター/強調表示/<strong>なし</strong>」から選択。"},
  {lvl:2,cat:"視覚化",q:"値によって色を変えたい",a:"<strong>条件付き書式</strong>",body:"「データの色」は固定色のみ。条件付き書式はルール・グラデーション・FXで動的変更。"},
  {lvl:2,cat:"視覚化",q:"地図ビジュアルで場所がずれる",a:"<strong>データカテゴリを設定</strong>",body:"国・都道府県・郵便番号などの地理列に「データカテゴリ」を割り当てる。モデルビュー or Power Query。"},
  {lvl:2,cat:"視覚化",q:"複数列を国→地域→都市の階層にしたい",a:"<strong>モデルビューで階層を作成</strong>",body:"列をドラッグするだけでは正式な階層にならない。「階層の作成」で公式階層を作ってから軸へ。"},
  {lvl:2,cat:"視覚化",q:"印刷・PDF・全行表示・帳票",a:"<strong>ページ分割レポート（Paginated Report）</strong>",body:"請求書・明細書など。.rdl形式。通常レポートはインタラクティブ向け。"},
  {lvl:1,cat:"視覚化",q:"ページ間でスライサーを連動",a:"<strong>同期スライサー</strong>",body:"「表示しないがフィルターは効かせたい」→ 同期ON・表示OFF（独立トグル）。"},
  {lvl:1,cat:"視覚化",q:"行ごとにフラグ・値を付けたい",a:"<strong>計算列</strong>",body:"メジャーは行を持てない。フィルターは表示制御のみ。「上位10%にフラグ」「各行に分類」→ 計算列。"},
  {lvl:1,cat:"視覚化",q:"複数メジャーに同じ計算パターンを一括適用",a:"<strong>計算グループ</strong>",body:"YoY・YTDなどを全メジャーに適用したい時。Tabular Editor等で作成。クイックメジャーは個別作成。"},

  // 配布・管理
  {lvl:2,cat:"配布",q:"オンプレミスSQL Serverへ自動接続",a:"<strong>オンプレミスデータゲートウェイ</strong>",body:"ImportでもDirectQueryでも必須。クラウドのPower BI Serviceは社内ネットワークに直接入れない。"},
  {lvl:2,cat:"配布",q:"定期的にレポートをメール送信",a:"<strong>サブスクリプション</strong>",body:"スケジュール設定でPDF/PPTX添付メール。レポートビューア向け。"},
  {lvl:2,cat:"配布",q:"閾値を超えたら通知",a:"<strong>データアラート</strong>",body:"KPI/カードビジュアルのみ対応。Power Automate連携可能。"},
  {lvl:2,cat:"配布",q:"ライセンスなし・社外・誰でも閲覧",a:"<strong>Webに公開（Publish to Web）</strong>",body:"完全公開になるため<strong>機密データNG</strong>。匿名アクセス可。"},
  {lvl:2,cat:"配布",q:"DirectQuery vs ライブ接続",a:"<strong>用途で使い分け</strong>",body:"・DirectQuery → SQL Server等の<strong>生のデータソース</strong>に直接<br>・ライブ接続 → <strong>Power BIデータセット or SSAS</strong>"},
  {lvl:1,cat:"配布",q:"レポートが遅い原因を調べたい",a:"<strong>パフォーマンスアナライザー</strong>",body:"表示タブ → 記録の開始 → ビジュアル毎にDAX/表示/その他の時間内訳が出る。"},
  {lvl:2,cat:"配布",q:"オンプレミスSQL自動更新セットアップの手順",a:"<strong>C→B→D→A</strong>",body:"<ol style='padding-left:18px'><li><strong>C</strong> ゲートウェイをサーバーにインストール</li><li><strong>B</strong> Desktopでレポート作成→Service発行</li><li><strong>D</strong> データソース資格情報を構成</li><li><strong>A</strong> スケジュール更新を有効化</li></ol>「<strong>橋を先に架ける</strong>」が定石。"},
  {lvl:2,cat:"DAX",q:"メジャーの小計・総計を自動計算したい",a:"<strong>何も特別な対応不要</strong>",body:"メジャーはフィルターコンテキストに応じて<strong>各集計レベルで自動再計算</strong>される。<br>ALLは「全フィルター無視で全体強制参照」の時だけ使う。<br>小計・総計の自動計算には不要（罠選択肢）。"},
  {lvl:2,cat:"配布",q:"オンプレミス接続で「最大遅延X分」要件",a:"<strong>DirectQuery（スケジュール更新不要）</strong>",body:"・「リアルタイム」「最大遅延N分」→ <strong>DirectQuery</strong><br>・DirectQueryなので<strong>スケジュール更新は不要</strong><br>・ただしオンプレミス接続なので<strong>ゲートウェイは必須</strong><br>「リアルタイム＝Import+短時間更新」と勘違いしやすいが、Importは更新間隔に下限がある。"},

  // === 過去アーカイブ（Q61-Q117）からの追加カード ===
  {lvl:3,cat:"視覚化",q:"レポートに新ビジュアル追加→ダッシュボードに自動反映",a:"<strong>ライブページのピン留め（Pin live page）</strong>",body:"個別ビジュアルのピン留めはスナップショット扱いで自動反映されない。<br>「ライブページのピン留め」=ページ全体を貼る → 後から追加したビジュアルも自動表示。<br><strong>Power BI サービス側でしか操作できない</strong>（Desktop不可）。Q61。"},
  {lvl:3,cat:"PowerQuery",q:"Mergeに使うだけの中間クエリ（Categoriesなど）",a:"<strong>「読み込みを有効にする」をオフ</strong>",body:"結合に使うだけで最終モデルに単独テーブルとして要らないクエリは<strong>Enable load = OFF</strong>でモデルサイズ削減。<br>右ペイン「クエリ」→ 右クリック →「読み込みを有効にする」で切替。Q83・Q78。"},
  {lvl:3,cat:"視覚化",q:"カスタムツールチップを使えるようにする3操作",a:"<strong>許可ON＋ビジュアル配置＋フィルター設定</strong>",body:"<ol style='padding-left:18px'><li>対象ページの「ページ情報」→<strong>「ツールチップとして使用を許可する」をON</strong></li><li>そのページに<strong>ビジュアルを配置</strong></li><li>そのページに<strong>フィルター</strong>を設定</li></ol>呼び出し側ビジュアル自体の設定は不要。Q90。"},
  {lvl:3,cat:"モデル",q:"リレーションを作る前にやるべき準備",a:"<strong>キー列のデータ型を一致させる（整数推奨）</strong>",body:"両テーブルのキー列データ型が違うとリレーションは成立しない。<br>キー列のベストプラクティス＝<strong>整数型</strong>（メモリ効率・パフォーマンスとも◎）。Q96。"},
  {lvl:3,cat:"PowerQuery",q:"列の一意性を確認したい",a:"<strong>列の分布 ＋ 列のプロファイル</strong>",body:"<table><tr><th>機能</th><th>用途</th></tr><tr><td>列の品質</td><td>有効/空白/エラー率の<strong>棒グラフ</strong></td></tr><tr><td><strong>列の分布</strong></td><td>ユニーク数・distinct数</td></tr><tr><td><strong>列のプロファイル</strong></td><td>詳細統計（最小/最大/平均）</td></tr></table>「列の品質」だけでは一意性は判定できない。Q7。"},
  {lvl:3,cat:"PowerQuery",q:"エラー値が含まれる列を解決したい",a:"<strong>「エラーを置換」</strong>",body:"<table><tr><th>操作</th><th>結果</th></tr><tr><td><strong>エラーを置換</strong></td><td>指定値に差し替え（データ保持）</td></tr><tr><td>エラーの削除</td><td>行ごと削除（データ損失）</td></tr><tr><td>エラーを保持</td><td>デバッグ用</td></tr></table>「データを失いたくない」要件では削除は選ばない。Q97。"},
  {lvl:3,cat:"視覚化",q:"色覚異常のユーザー向けに全体色を変えたい",a:"<strong>テーマカラー ＋ センチメントカラー</strong>",body:"・<strong>テーマカラー</strong>：レポート全体のデフォルト色を一括変更<br>・<strong>センチメントカラー</strong>：KPIやウォーターフォールの<strong>増減色</strong>（赤=悪・緑=良など）<br>「第1レベル要素の色」「発散色」は限定用途で全体変更には不十分。Q101。"},
  {lvl:3,cat:"視覚化",q:"カスタムテーマをダッシュボードでも使いたい",a:"<strong>JSON保存→アップロード</strong>",body:"テーマの実体は<strong>JSONファイル</strong>。ダッシュボードはレポートのテーマを自動継承しない。<br>1. ReportAから<strong>テーマをJSON保存</strong><br>2. DashboardAで<strong>JSONをアップロード</strong><br>ダッシュボード上でテーマ新規作成は不可。Q103。"},
  {lvl:3,cat:"DAX",q:"日次スナップショット型ファクト（Balances等）の集計",a:"<strong>日単位のカウントのみ正確</strong>",body:"・年・月で集計すると<strong>同じ口座が複数日でカウントされ延べ数</strong>になる<br>・「通じて（throughout）」=全期間該当の意味は単純カウントでは出せない（intersect判定が必要）<br>類例：在庫スナップショット、従業員在籍判定。Q112。"},
  {lvl:2,cat:"配布",q:"Azure SQL接続のCommand timeout既定値",a:"<strong>10分</strong>",body:"Power BI Desktop のSQL系接続のCommand timeout既定値=<strong>10分</strong>。<br>ナビゲーターは<strong>メタデータ表示</strong>＝データ有無と無関係に表示。「完全な階層を使用して移動」は表示形式（スキーマ階層/フラット）の切替であって絞り込みではない。Q115。"},
  {lvl:3,cat:"PowerQuery",q:"同構造2テーブルから重複なしリストを作る",a:"<strong>Append ＋ 重複削除</strong>",body:"縦に積む（Append）→ 重複行を削除。<br>「マージ」は横方向に列を足す別操作。Q63（3回失点）。"},
  {lvl:2,cat:"PowerQuery",q:"「日付 at 時刻」を日付列に変換したい",a:"<strong>「at」で列分割 ＋ Date型変換</strong>",body:"区切り文字で分割→Date型に変換が定石。「例から列を作成」は不安定。<br>「時間ごと分析」要件があるならDate型変換すると<strong>時刻が消失するのでNG</strong>。Q64・Q93・Q21②。"},
  {lvl:2,cat:"モデル",q:"Dual モード（Storage Mode）",a:"<strong>Import/DirectQuery 両方と結合するディメンション用</strong>",body:"DualテーブルはInportとDirectQueryの両方のテーブルとリレーションを持てる。<br>「両刀使いのディメンション」と覚える。Date等の共通ディメンションで活用。Q41。"},
  {lvl:2,cat:"セキュリティ",q:"動的RLS（1ロールで多数ユーザー対応）",a:"<strong>USERNAME() ＋ 両方向フィルター</strong>",body:"<code>[Email] = USERNAME()</code>等で動的にフィルター。1ロールで全ユーザー対応。<br>従業員→部署のフィルターを効かせるには<strong>双方向フィルター</strong>が必要なケースあり。Q48。"},
  {lvl:2,cat:"セキュリティ",q:"RLS実装の正しい順序",a:"<strong>定義→発行→割当→権限</strong>",body:"<ol style='padding-left:18px'><li>Desktopでロール定義（DAX）</li><li>Service へ発行</li><li>Service でユーザー割り当て</li><li>レポート権限を付与</li></ol>「発行してから割当」が鉄則。順序逆を選ばない。Q57。"},
  {lvl:2,cat:"視覚化",q:"10カテゴリの利益を比較したい",a:"<strong>集合棒グラフ</strong>",body:"カテゴリ比較=棒グラフが定石。面グラフは時系列の累積向け。<br>「比較」キーワード→ 棒で反射。Q73。"},
  {lvl:2,cat:"視覚化",q:"売上実績 vs 目標を時系列で見たい",a:"<strong>KPIビジュアル</strong>",body:"折れ線は推移は見せるが<strong>目標との対比</strong>がない。<br>KPIビジュアル＝「実績値 ＋ 目標値 ＋ 推移」を1つで表示。Case③-Q3。"},
  {lvl:2,cat:"視覚化",q:"既存ダッシュボードに最小影響でビジュアル追加",a:"<strong>ピン留め ＋ Q&A</strong>",body:"レポートを変更すると他にも影響。Q&A結果をピン留めすれば<strong>レポートに手を入れず</strong>追加可。<br>「クイックインサイト」は別物（インサイト自動生成）。Q85。"},
  {lvl:2,cat:"配布",q:"Azure DevOps Analytics への接続",a:"<strong>OData フィード</strong>",body:"分析ビュー＝OData<strong>フィード</strong>（Queryではない）。<br>「OData クエリ」と「OData フィード」の罠用語に注意。Q52。"},
  {lvl:2,cat:"配布",q:"既存メジャーを別レポートで再利用したい",a:"<strong>共有データセット</strong>（データフローではない）",body:"データフローは<strong>変換ロジックの再利用</strong>用で、メジャーは引き継げない。<br>メジャー再利用＝<strong>共有データセット</strong>に接続して新レポート作成。Q79。"},
  {lvl:2,cat:"視覚化",q:"レポートにコメント・@メンションで報告",a:"<strong>コメント機能</strong>",body:"アラートは閾値通知用。コメント機能は<strong>レポート内の議論・@メンション通知</strong>用。Q105。"},
  {lvl:2,cat:"モデル",q:"大規模データの集計（パフォーマンス重視）",a:"<strong>グループ化 ＋ COUNTROWS ＋ リレーション</strong>",body:"計算テーブルは逆効果（メモリ消費）。<br>Power Queryで<strong>事前集計</strong>→集計テーブルとファクトをリレーション。Q94。"},
  {lvl:2,cat:"PowerQuery",q:"AppSourceでユーザーが見られない",a:"<strong>アクセス設定</strong>（コンテンツ設定ではない）",body:"「コンテンツ設定」と「アクセス設定」の用語の罠。<br>ユーザーが<strong>見られない</strong>＝アクセス権の問題。Q25。"},

  {lvl:2,cat:"DAX",q:"行ごとに分類フラグ（VIP/通常）を作りたい",a:"<strong>計算列（メジャー不可）</strong>",body:"<table><tr><th>使い方</th><th>計算列</th><th>メジャー</th></tr><tr><td>スライサー</td><td>✅</td><td>❌</td></tr><tr><td>軸・カテゴリ</td><td>✅</td><td>❌</td></tr><tr><td>カード・KPI</td><td>—</td><td>✅</td></tr><tr><td>合計・平均</td><td>—</td><td>✅</td></tr></table>メジャーは<strong>集計値1つ</strong>しか返せない。スライサー・軸には<strong>行ごとの値を持つ列</strong>が必要なので必ず計算列。<br>反射：「分類して<strong>絞り込みたい</strong>」→ 計算列／「集計値を<strong>表示したい</strong>」→ メジャー。ランダム㉞。"},

  // === バッチ㊴〜㊽ 追加（2026-04-30 ミス） ===
  {lvl:2,cat:"配布",q:"ゲートウェイが必要なデータソースの判断",a:"<strong>オンプレミスのみ必要、クラウドは不要</strong>",body:"<table><tr><th>場所</th><th>例</th><th>ゲートウェイ</th></tr><tr><td>☁️ クラウド</td><td>Azure SQL / SharePoint Online / OneDrive</td><td>❌ 不要</td></tr><tr><td>🏢 オンプレミス</td><td>オンプレSQL Server / 社内ファイル共有のExcel</td><td>✅ 必要</td></tr></table>判断軸は「データの置き場所」だけ。SharePoint <strong>Online</strong> はクラウド／SharePoint <strong>Server</strong> はオンプレ。Excelも置き場所による。ランダム㊱。"},
  {lvl:3,cat:"DAX",q:"ALL vs ALLSELECTED（地域シェア計算）【🚨5回ミス】",a:"<strong>「選択した範囲内」=ALLSELECTED／「全国/全体」=ALL</strong>",body:"問題文のキーワードで反射：<br>・「<strong>選択した</strong>」「<strong>表示中</strong>」「<strong>選択範囲</strong>」「<strong>絞り込んだ中で</strong>」→ ALLSELECTED<br>・「<strong>全国</strong>」「<strong>全体</strong>」「<strong>総〇〇</strong>」「<strong>全社</strong>」→ ALL<br>罠：「地域全体に占めるシェア」の「全体」だけ見るとALLに見えるが、「<strong>選択した地域の中での全体</strong>」 → ALLSELECTED。「何の全体？」を必ず確認。<strong>5回目ミス</strong>。"},
  {lvl:2,cat:"PowerQuery",q:"列の品質・列の分布・列のプロファイルの違い",a:"<strong>3つの機能で見える情報が違う</strong>",body:"<table><tr><th>機能</th><th>見える情報</th></tr><tr><td>列の品質</td><td>有効/空白/エラー率の<strong>棒グラフ</strong></td></tr><tr><td>列の分布</td><td><strong>ユニーク値・distinct数</strong>（ヒストグラム）</td></tr><tr><td>列のプロファイル</td><td><strong>最小/最大/平均</strong>などの詳細統計</td></tr></table>「一意性確認」→ 列の分布／「統計的ばらつき」→ 列のプロファイル。すべて欲しいなら3つON。ランダム㊳。"},
  {lvl:2,cat:"セキュリティ",q:"動的RLS：USERNAME() vs USERPRINCIPALNAME()",a:"<strong>USERPRINCIPALNAME() 一択</strong>",body:"USERNAME() は Desktop で <code>DOMAIN\\user</code>、Service で UPN形式と<strong>戻り値の形式が違う</strong>。<br>USERPRINCIPALNAME() は Desktop でも Service でも <strong>UPN形式で一貫</strong>。<br>Microsoft Entra ID（旧Azure AD）環境では UPN ベースなので USERPRINCIPALNAME() が安全・推奨。ランダム㊵。"},
  {lvl:2,cat:"DAX",q:"AVERAGE と BLANK の関係",a:"<strong>AVERAGE は BLANK を自動除外（NOT ISBLANK は冗長）</strong>",body:"DAX の <strong>AVERAGE / SUM / MIN / MAX / COUNT は BLANK を自動的に無視</strong>する。<br><code>CALCULATE(AVERAGE(...), NOT ISBLANK(...))</code> は冗長で書く必要なし。<br>⚠️ <strong>COUNTROWS</strong> だけはテーブルの行数を数えるので BLANK行も数える（罠）。<br>「平均出すならAVERAGE一発でOK」「NOT ISBLANK 書きたくなったら一旦止まれ」。ランダム㊶。"},
  {lvl:2,cat:"PowerQuery",q:"タグ列（「Apple; Mobile; Apple」など）の展開",a:"<strong>列の分割 → 各「行」に分割</strong>",body:"1セルに「; 」区切りで複数値が入ってる → <strong>列の分割で「各行」を選択</strong>。<br>複数列に分割すると同じ値（&quot;Apple&quot;）が異なる列に散らばってスライサー・集計に使えない。<br>各行に分割すると1製品が複数行に複製され、各行に1タグ＝スライサーで反応する。<br>反射：「タグ的な複数値」「絞り込みたい」→ <strong>行に分割</strong>。ランダム㊷。"},
  {lvl:3,cat:"視覚化",q:"条件付き書式：複数列の複合条件で色付け",a:"<strong>フィールド値（Field value）</strong>",body:"<table><tr><th>種類</th><th>用途</th></tr><tr><td>色スケール</td><td>1列の数値でグラデーション</td></tr><tr><td>ルール</td><td>1列の値の範囲で分岐</td></tr><tr><td><strong>フィールド値</strong></td><td><strong>メジャーが返す色名で動的色付け</strong></td></tr><tr><td>アイコン</td><td>アイコン表示用（背景色不可）</td></tr></table>複数列のAND/OR条件 → メジャーで判定 → 色名を返す → フィールド値で適用。<br><code>警告色 = IF([ProfitMargin]&lt;0.05 && [QuantitySold]&gt;100, &quot;Red&quot;, BLANK())</code><br>ランダム㊸。"},
  {lvl:2,cat:"配布",q:"コンテンツの承認（Endorsement）",a:"<strong>認定（Certified）= 公式品質マーク</strong>",body:"<table><tr><th>レベル</th><th>付与者</th><th>意味</th></tr><tr><td>なし</td><td>—</td><td>—</td></tr><tr><td>プロモーション</td><td>誰でも（共同作成者以上）</td><td>「いいね」レベルの推奨</td></tr><tr><td><strong>認定</strong></td><td><strong>テナント管理者が指定したユーザーのみ</strong></td><td>組織として品質保証済み</td></tr></table>⚠️ <strong>機密ラベル</strong>は情報の機密度（Confidential など）であって品質マークではない。<strong>承認(品質)</strong> と <strong>機密ラベル(機密度)</strong> は別概念。ランダム㊺。"},
  {lvl:2,cat:"視覚化",q:"帳票・請求書を1取引先=1PDFで出力",a:"<strong>ページ分割レポート（Paginated Report / .rdl）</strong>",body:"反射キーワード：「帳票」「請求書」「明細書」「印刷」「改ページ」「ヘッダー/フッター」「.rdl」「Report Builder」「全行表示」「ピクセル単位」→ ページ分割レポート。<br>通常レポート（PBIX）はインタラクティブ向きで改ページや帳票機能なし。「PDFで出したい」だけなら通常レポートでもできるが、<strong>帳票要件</strong>（改ページ・1行ずつ正確に）が出たらページ分割レポート一択。ランダム㊼。"},

  // === バッチ㊾〜54 追加（2026-04-30） ===
  {lvl:2,cat:"DAX",q:"SAMEPERIODLASTYEARがBLANKを返す原因",a:"<strong>リレーション or「日付テーブルとしてマーク」を確認</strong>",body:"タイムインテリジェンス3つの前提条件：<br>① 連続した日付の Date テーブル<br>② <strong>「日付テーブルとしてマーク」</strong>設定済み<br>③ <strong>Date ↔ Fact にアクティブリレーション</strong><br>BLANK が返る最頻原因はリレーション未設定/非アクティブ。複数日付列の場合は USERELATIONSHIP で切替。ランダム㊾。"},
  {lvl:2,cat:"PowerQuery",q:"月別の列が並んでる横持ちデータを縦持ちに",a:"<strong>列のピボット解除（Unpivot Columns）</strong>",body:"反射：「<strong>横持ち→縦持ち</strong>」「列見出しを行値に」「月の列が並んでる」→ ピボット解除。<br>逆方向（縦→横）はピボット。<br>Power BI 分析向き＝<strong>縦持ち</strong>が基本。Excel帳票はほぼUnpivotから始まる。ランダム㊿。"},
  {lvl:3,cat:"視覚化",q:"クリックの影響を特定ビジュアルだけ受けさせない",a:"<strong>相互作用を編集（Edit interactions）→ 🚫なし</strong>",body:"3アイコン：📊フィルター（既定）／✨強調表示／🚫なし。<br>反射：<br>・「同じページ内のビジュアル間制御」→ 相互作用を編集<br>・「ページ間でスライサー連動」→ 同期スライサー（別機能）<br>・「強調表示だけしたい」→ 相互作用を編集 →✨強調表示<br>操作：書式タブ → 相互作用を編集 ON → 対象ビジュアル右上のアイコンクリック。ランダム51。"},
  {lvl:2,cat:"配布",q:"定期メール配信 と しきい値即時通知 の使い分け",a:"<strong>定期=サブスクリプション／値=データアラート</strong>",body:"<table><tr><th></th><th>サブスクリプション</th><th>データアラート</th></tr><tr><td>トリガー</td><td>時刻ベース</td><td>値ベース（KPI閾値）</td></tr><tr><td>対象</td><td>レポート全体・ページ</td><td>KPI/カード/ゲージのみ</td></tr><tr><td>配信</td><td>PDF/PPTX添付</td><td>メール本文通知</td></tr><tr><td>Power Automate連携</td><td>❌</td><td>✅</td></tr></table>覚え方：<strong>時間=サブスク／値=アラート</strong>。ランダム52。"},
  {lvl:2,cat:"DAX",q:"複数メジャーに同じ計算パターンを一括適用",a:"<strong>計算グループ（Calculation Groups）</strong>",body:"5メジャー × 3パターン（YTD/YoY/MoM）= 15個に爆発するのを防ぐ。<br>計算グループは1パターン定義 → 全メジャーに適用。Tabular Editor等の外部ツールで作成（Desktop標準機能ではない）。<br>反射：「メジャーが爆発」「N×M個になる」「YoY/YTDを全メジャーに」「Tabular Editor」→ 計算グループ。<br>「メジャーをフォルダ整理」は<strong>メジャーテーブル</strong>（別物）。ランダム53。"},
  {lvl:2,cat:"視覚化",q:"自然言語で質問してグラフ生成",a:"<strong>Power BI Q&amp;A</strong>",body:"反射：<br>・「自然言語で質問」「ユーザーが入力」→ <strong>Q&amp;A</strong>（能動）<br>・「自動でインサイト発見」→ クイックインサイト（自動）<br>・「データを文章で説明」→ スマートナラティブ<br>・「閾値超え通知」→ データアラート<br>Q&amp;Aは用語学習機能あり（「売上」と「Sales」を同義語登録可能）。ランダム54。"},

  // === バッチ55〜97 追加（2026-04-30〜2026-05-02） ===
  {lvl:2,cat:"視覚化",q:"分解ツリー vs 主要なインフルエンサー",a:"<strong>用途が真逆のAIビジュアル</strong>",body:"・<strong>分解ツリー</strong>：「メジャーを階層的に分解」「次元をAIが提案」<br>・<strong>主要なインフルエンサー</strong>：「何が影響？」「要因分析」<br>反射：「分解」「深掘り」→ 分解ツリー／「何が原因？」「要因」→ 主要なインフルエンサー。ランダム57ミス。"},
  {lvl:2,cat:"DAX",q:"任意の期間・単位で日付シフト",a:"<strong>DATEADD(日付列, N, 単位)</strong>",body:"単位：DAY / MONTH / QUARTER / YEAR<br>反射：「N月前」「N年前」「期間と単位を柔軟に」→ DATEADD。SAMEPERIODLASTYEAR / PREVIOUSMONTH は専用。PARALLELPERIOD は同期間比較にならない罠。ランダム60。"},
  {lvl:3,cat:"モデル",q:"テキスト列をアルファベット順以外で並べたい",a:"<strong>モデルレベルで「列で並べ替え」設定</strong>",body:"MonthName 列を MonthNumber で並べ替えるなど。<br>列ツール → 列で並べ替え → 並び順用列を選択。<br>全ビジュアルに一貫適用。ビジュアル単位の並べ替えは対症療法（保守性低）。ランダム62ミス。"},
  {lvl:3,cat:"視覚化",q:"スマホで見やすいレイアウト",a:"<strong>携帯電話レイアウト（Mobile Layout）</strong>",body:"Power BI Desktop → <strong>表示タブ → 携帯電話レイアウト</strong>。1ファイルにPC版＋モバイル版が同居。Mobile アプリで縦持ち時に自動表示。<br>反射：「スマホで見やすく」「モバイル対応」「縦長レイアウト」→ Mobile Layout。ランダム63ミス。"},
  {lvl:3,cat:"DAX",q:"ゼロ除算を回避（#DIV/0!対策）",a:"<strong>DIVIDE 関数</strong>",body:"<code>DIVIDE(分子, 分母)</code> → ゼロ時BLANK<br><code>DIVIDE(分子, 分母, 0)</code> → ゼロ時 0<br>IF + 割り算は冗長。常に DIVIDE を使う。<br>反射：「ゼロ除算」「#DIV/0!」「割り算でエラー」→ DIVIDE。ランダム76ミス。"},
  {lvl:2,cat:"PowerQuery",q:"行に連番を振る・主キー作成",a:"<strong>インデックス列を追加</strong>",body:"列の追加タブ → インデックス列。0開始 / 1開始 / カスタム から選択。<br>反射：「行番号」「連番」「主キー作成」「並び順を保持」→ インデックス列。ランダム84。"},
  {lvl:3,cat:"配布",q:"データセットを使うレポートの依存関係確認",a:"<strong>リネージビュー（Lineage View）</strong>",body:"ワークスペース画面 → 表示切替 → 系統。<br>データソース→データセット→レポートを矢印で可視化。変更前の影響範囲チェックに必須。<br>反射：「依存関係」「影響範囲」「どのレポートが使ってる？」→ リネージビュー。「誰が何をした」は<strong>監査ログ</strong>（別物）。ランダム91ミス。"},
  {lvl:3,cat:"DAX",q:"派生テーブルをDAXで作る",a:"<strong>計算テーブル（Calculated Table）</strong>",body:"モデリングタブ → 新しいテーブル → DAX式を入力。<br>例：<code>Top10Products = TOPN(10, Product, [Total Sales])</code><br>反射：「派生テーブル」「TOP10専用テーブル」「DAXで完結」→ 計算テーブル。1ビジュアルだけのTop NはビジュアルレベルTop Nフィルター（別物）。ランダム97ミス。"},

  // バッチ55〜97 の正解問題（重要反射キーワード）
  {lvl:2,cat:"配布",q:"Pro vs Premium のスケジュール更新回数",a:"<strong>Pro=8回/日、Premium=48回/日</strong>",body:"両方とも最短間隔30分。1分間隔の自動更新は Premium 専用機能（Automatic page refresh）。<br>反射：「Pro で12回更新したい」→ Premium 必須。「リアルタイム」→ DirectQuery or Premium。ランダム55。"},
  {lvl:1,cat:"PowerQuery",q:"データ型最適化（メモリ効率）",a:"<strong>整数 &gt; 固定小数点 &gt; 10進数 &gt; テキスト</strong>",body:"VertiPaq圧縮効率の順。整数値しか入らない列は <strong>Whole Number</strong> に変換でファイル激減。Boolean &lt; 整数 &lt; Date &lt; Currency &lt; Decimal &lt; DateTime &lt; テキスト。ランダム56。"},
  {lvl:2,cat:"配布",q:"データモデル含むテンプレート配布",a:"<strong>PBIT（テンプレートファイル）</strong>",body:"・PBIX：実データ含む<br>・<strong>PBIT</strong>：レイアウト＋モデル定義のみ（データなし）<br>・PBIDS：データソース接続情報のみ<br>反射：「テンプレート」「データなしで配布」→ PBIT。ランダム58/78。"},
  {lvl:2,cat:"視覚化",q:"スライダーで数値変更してシミュレーション",a:"<strong>What-If パラメーター</strong>",body:"モデリングタブ → 新しいパラメーター → 数値範囲。スライダー＋メジャーが自動生成。<br>反射：「What-If分析」「もし〜だったら」「割引率/利率を可変に」→ What-Ifパラメーター。ランダム59。"},
  {lvl:2,cat:"PowerQuery",q:"フォルダー内の複数ファイル統合",a:"<strong>フォルダーから（From Folder）</strong>",body:"同構造CSVが継続追加される時。スケジュール更新時に新ファイルも自動取り込み。<br>反射：「フォルダー内の複数ファイル」「自動で追加取り込み」→ From Folder + Combine Files。ランダム70。"},
  {lvl:1,cat:"配布",q:"少人数に1レポートだけ共有",a:"<strong>「共有」ボタン</strong>",body:"レポート右上 → 共有 → 個別ユーザー指定。<br>反射：「特定の少人数に1つだけ」→ 共有／「大規模配布・パッケージ」→ アプリ／「複数人で編集」→ ワークスペース メンバー。ランダム71。"},
  {lvl:2,cat:"DAX",q:"複数閾値でランク分け",a:"<strong>SWITCH(TRUE(), ...)</strong>",body:"<code>SWITCH(TRUE(), [Score]&gt;=90, &quot;S&quot;, [Score]&gt;=80, &quot;A&quot;, &quot;C&quot;)</code><br>ネストIFより読みやすく保守性高。<br>反射：「複数閾値」「ランク分け」「N段階の条件分岐」→ SWITCH(TRUE())。ランダム72。"},
  {lvl:1,cat:"視覚化",q:"ページ間でスライサー連動",a:"<strong>同期スライサー</strong>",body:"複数ページの同じスライサー値を連動。「表示しないがフィルターは効かせたい」→ 同期ON・表示OFF。同じページ内のビジュアル間制御は「相互作用を編集」（別機能）。ランダム73。"},
  {lvl:2,cat:"PowerQuery",q:"結合セルなどで空白を直前の値で埋める",a:"<strong>下方向へフィル（Fill Down）</strong>",body:"列を右クリック → フィル → 下方向。Excel結合セル取り込み時の定番処理。逆は上方向へフィル。空白すべて同じ値は「値の置換」。ランダム74。"},
  {lvl:2,cat:"視覚化",q:"年→四半期→月→日と階層的に深掘り",a:"<strong>モデルビューで「階層」を作成</strong>",body:"Date テーブルで Year/Quarter/Month/Day を含む階層を作成 → ビジュアルの軸に階層をドラッグ → ドリルダウンが正式に動く。<br>列をただ並べるだけでは正式階層にならない。ランダム77。"},
  {lvl:2,cat:"DAX",q:"日付テーブルをDAXで作る",a:"<strong>CALENDARAUTO() / CALENDAR(開始, 終了)</strong>",body:"モデリングタブ → 新しいテーブル。<br>・CALENDARAUTO()：モデル内の日付範囲から自動生成<br>・CALENDAR(start, end)：明示的に範囲指定<br>反射：「日付テーブルを作る」「DAXで完結」→ CALENDARAUTO。ランダム79。"},
  {lvl:2,cat:"PowerQuery",q:"Formula.Firewallエラー（社内データ＋公開API）",a:"<strong>プライバシーレベルを設定</strong>",body:"3レベル：Private（社外秘・他と混合不可）／Organizational（社内のみ）／Public（公開）。<br>適切に設定すれば機密情報を外部送信せずに組合せ可能。SkipPrivacyChecks はセキュリティリスクで非推奨。ランダム80。"},
  {lvl:2,cat:"視覚化",q:"複数ページ間のナビゲーションバー",a:"<strong>ボタン → 動作「ページナビゲーター」</strong>",body:"挿入タブ → ボタン → 動作 → ページナビゲーター（Page Navigator）。ページ追加・削除を自動反映、現在ページ強調も標準対応。ランダム81。"},
  {lvl:2,cat:"配布",q:"データセット所有者の退職対応",a:"<strong>「所有者を引き継ぐ（Take over）」機能</strong>",body:"データセット設定画面 → 所有者を引き継ぐ。スケジュール更新・ゲートウェイ設定も維持される。データフローにも同じ機能あり。<br>削除して再作成は履歴が消えるのでNG。ランダム82。"},
  {lvl:2,cat:"DAX",q:"DAXコードの可読性とパフォーマンス改善",a:"<strong>VAR + RETURN で変数化</strong>",body:"<code>VAR Current = SUM(...)<br>VAR LastYear = CALCULATE(...)<br>RETURN SWITCH(TRUE(), Current &gt; LastYear, &quot;↑&quot;, ...)</code><br>同じ計算を1度だけ評価。ネストIFの代わりに SWITCH(TRUE()) と組み合わせると読みやすい。ランダム83。"},
  {lvl:2,cat:"視覚化",q:"スライサーで多数項目から検索",a:"<strong>スライサーの「検索」を有効化</strong>",body:"スライサー右上「…」→ 検索。文字入力で候補絞込。<br>表示形式：リスト/タイル/ドロップダウン／向き：縦/横/レスポンシブ／選択モード：複数/単一。ランダム85。"},
  {lvl:2,cat:"視覚化",q:"複数KPIを担当者割当で一元管理",a:"<strong>Power BI Goals（スコアカード/メトリクス）</strong>",body:"複数KPI管理・担当者割当・ステータス（On Track/At Risk/Off Track）追跡の専用機能。<br>単一KPIの実績/目標表示は KPI ビジュアル（別物）。ランダム88。"},
  {lvl:2,cat:"DAX",q:"単一選択時の値、それ以外は代替値",a:"<strong>SELECTEDVALUE(列, 代替値)</strong>",body:"<code>SELECTEDVALUE(Product[Category], &quot;All Categories&quot;)</code><br>カードビジュアルでの動的タイトル定番。<br>VALUES はテーブル返すので使えない。HASONEVALUE は単一値判定（True/False）。ランダム89。"},
  {lvl:1,cat:"PowerQuery",q:"1行目を列ヘッダーに昇格",a:"<strong>1行目をヘッダーとして使用</strong>",body:"変換タブ または 列ツール → 1行目をヘッダーとして使用。逆は「ヘッダーを1行目として使用」。Excel取り込み時に Column1, Column2... になっていたら必要。ランダム90。"},
  {lvl:2,cat:"視覚化",q:"標準にないビジュアル（サンキー図など）",a:"<strong>AppSource からカスタムビジュアル</strong>",body:"挿入タブ → その他のビジュアル → AppSource から取得。Microsoft 認定。<br>R/Python ビジュアルは自作向き。組織のカスタムビジュアルは社内承認済みパッケージ。ランダム92。"},
  {lvl:2,cat:"配布",q:"オンプレSQLをチームで共有更新",a:"<strong>標準モードゲートウェイ</strong>",body:"・<strong>標準モード</strong>：複数ユーザー・複数製品（PowerBI/Power Automate/Logic Apps等）で共有可<br>・個人モード：自分専用、Power BI Service との接続のみ<br>反射：「チームで共有」「集中管理」→ 標準モード。ランダム93。"},
  {lvl:2,cat:"DAX",q:"暗黙メジャー vs 明示メジャー",a:"<strong>明示メジャーがベストプラクティス</strong>",body:"列をそのままドラッグ→暗黙メジャーは名前固定・書式統一不可・再利用不便。<br>明示メジャー：<code>売上合計 = SUM(Sales[Amount])</code> → 名前/書式統一・再利用・修正の一元反映。ランダム94。"},
  {lvl:2,cat:"PowerQuery",q:"明細不要・集計値だけで取り込みたい",a:"<strong>グループ化（Group By）</strong>",body:"変換タブ → グループ化 → Region × Month で SUM等。<br>1000万行を数千行に圧縮可能。ファイルサイズ・パフォーマンス両方改善。ランダム95。"},
  {lvl:2,cat:"配布",q:"アプリの利用ユーザーを追加",a:"<strong>アクセス許可で追加 → アプリの更新</strong>",body:"既存アプリ → アクセス許可の管理 → ユーザー追加 → アプリの更新ボタン。これで全員に反映。<br>新アプリ作成や再発行は過剰。ワークスペース メンバーは開発権限が広がるのでNG。ランダム96。"},
  {lvl:2,cat:"PowerQuery",q:"Query Folding の確認方法",a:"<strong>右クリック →「ネイティブクエリの表示」</strong>",body:"ステップを右クリックしてメニューに表示されればフォールディング成功（SQL生成済）。<br>フォールディング可能：列選択/行フィルター/グループ化/結合<br>切れる：カスタムM/インデックス列/例から列。ランダム61。"},
  {lvl:2,cat:"PowerQuery",q:"if-then-else をGUIで",a:"<strong>条件付き列（Conditional Column）</strong>",body:"列の追加タブ → 条件付き列。GUIで if-then-else 構築。M知識不要。<br>類似機能：「例から列を作成」（複雑な文字列加工をAI推論）／カスタム列（Mコード手書き）。ランダム67/87。"},
  {lvl:2,cat:"視覚化",q:"折れ線に目標線・予測線を追加",a:"<strong>分析（Analytics）ペイン</strong>",body:"・定数線（任意の固定値）<br>・最小/最大/平均/中央値線<br>・予測（折れ線・面のみ）<br>・推移線・エラーバー・異常検出<br>反射：「グラフに線追加」「予測表示」→ 分析ペイン（書式ペインではない）。ランダム69。"},

  // === バッチ98〜107 追加（2026-05-10） ===
  {lvl:2,cat:"PowerQuery",q:"巨大データセットの更新時間短縮",a:"<strong>増分更新（Incremental Refresh）</strong>",body:"直近N日分だけ更新、過去履歴は保持。Power Query パラメーター <code>RangeStart / RangeEnd</code> が必須要素。Pro/Premium両対応。<br>反射：「履歴保持」「更新時間短縮」「直近Nヶ月のみ」→ 増分更新。ランダム98。"},
  {lvl:3,cat:"DAX",q:"行ごとに掛け算・割り算してから合計",a:"<strong>SUMX</strong>",body:"<code>SUMX(Sales, Sales[Quantity] * Sales[UnitPrice])</code><br>SUM(Q) × SUM(P) は値が爆発（合計同士の掛け算）。<br>SUM = 列をそのまま合計（軽量）／SUMX = 行ごとに評価して合計（柔軟）。AVERAGEX, COUNTX も同様。ランダム99ミス。"},
  {lvl:3,cat:"視覚化",q:"データを文章で動的に説明",a:"<strong>スマートナラティブ</strong>",body:"5つのAI機能：<br>・<strong>スマートナラティブ</strong>：説明する（テキスト生成）<br>・Q&amp;A：質問する（能動）<br>・クイックインサイト：発見する（自動）<br>・主要なインフルエンサー：要因分析<br>・分解ツリー：階層分解<br>反射：「文章で説明」「動的テキスト」「ナラティブ」→ スマートナラティブ。ランダム100ミス。"},
  {lvl:3,cat:"配布",q:"OneDrive上のExcelを自動更新",a:"<strong>OneDrive連携で約1時間おきに自動同期</strong>",body:"OneDrive / SharePoint Online → Power BI の標準連携でゲートウェイ不要・スケジュール手動構成不要。<br>反射：「OneDrive / SharePoint Online」→ 自動同期／「オンプレミスExcel」→ ゲートウェイ必須。クラウド⇄クラウドはゲートウェイ不要。ランダム101ミス。"},
  {lvl:2,cat:"DAX",q:"順位（ランキング）を計算列で",a:"<strong>RANKX(ALL(テーブル), 式)</strong>",body:"<code>順位 = RANKX(ALL(Product), [Total Sales])</code><br>ALL がないと現在のフィルター行のみで順位（=1ばかり）。<br>反射：「順位」「ランキング」→ RANKX(ALL(...))／「上位N件抽出」→ TOPN／「累計」→ TOTALYTD。ランダム102。"},
  {lvl:2,cat:"視覚化",q:"期初→期末の差分要因分析",a:"<strong>ウォーターフォールチャート</strong>",body:"+/− の寄与度を棒の上下移動で積上的に見せる。利益増減・在庫変動・予算差異の定番。<br>反射：<br>・「期初→期末の推移」「+/−寄与度」→ ウォーターフォール<br>・「構成比100%」→ 円/ドーナツ<br>・「順位の時系列変化」→ リボンチャート<br>・「階層構造の面積比較」→ ツリーマップ<br>・「ステップ別離脱率」→ ファネル。ランダム103。"},
  {lvl:1,cat:"PowerQuery",q:"先頭の不要メタデータをスキップ",a:"<strong>上位N行の削除 → 1行目をヘッダー</strong>",body:"ホームタブ → 行の削除 → 上位N行の削除 / 下位N行の削除 / 空白行の削除 / 重複の削除。<br>反射：「先頭メタデータ」「上のN行を捨てる」→ 上位N行の削除／「合計行など最後のN行」→ 下位N行の削除。ランダム104。"},

const cardsEl = document.getElementById("cards");
const searchEl = document.getElementById("search");
const filtersEl = document.getElementById("filters");
let currentFilter = "all";

function getMarked(){
  try{return new Set(JSON.parse(localStorage.getItem("pl300_marked")||"[]"))}catch(e){return new Set()}
}
function setMarked(set){
  localStorage.setItem("pl300_marked", JSON.stringify([...set]));
}
function toggleMark(q){
  const set = getMarked();
  if(set.has(q)) set.delete(q); else set.add(q);
  setMarked(set);
  render();
}

function render(){
  const kw = searchEl.value.trim().toLowerCase();
  const marked = getMarked();
  let list = data.filter(d=>{
    if(currentFilter==="marked" && !marked.has(d.q)) return false;
    if(currentFilter==="critical" && !d.critical) return false;
    if(currentFilter!=="all" && currentFilter!=="critical" && currentFilter!=="marked" && d.cat!==currentFilter) return false;
    if(kw){
      const text = (d.q+d.a+d.body+d.cat).toLowerCase();
      if(!text.includes(kw)) return false;
    }
    return true;
  });
  list.sort((a,b)=>b.lvl-a.lvl);
  cardsEl.innerHTML = list.length===0
    ? '<div class="no-result">該当するカードがありません</div>'
    : list.map((d,i)=>cardHTML(d,i,marked)).join("");
  document.getElementById("total").textContent = data.length;
  document.getElementById("critical").textContent = data.filter(d=>d.critical).length;
  document.getElementById("markedCount").textContent = marked.size;
}
function cardHTML(d,i,marked){
  const lvlText = {4:"🚨 最重要",3:"⚠️ 重要",2:"📌 頻出",1:"📖 基本"}[d.lvl];
  const isMarked = marked.has(d.q);
  const safeQ = d.q.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  return `<div class="card${isMarked?' is-marked':''}" data-idx="${i}" onclick="this.classList.toggle('flipped')">
    <div class="card-inner">
      <div class="face front">
        <button class="mark-btn${isMarked?' marked':''}" onclick="event.stopPropagation();toggleMark('${safeQ}')" title="${isMarked?'マーク解除':'マークして後でまとめて見る'}">📌</button>
        <div><span class="lvl lvl-${d.lvl}">${lvlText}</span><span class="cat">${d.cat}</span></div>
        <div class="q">Q. ${d.q}</div>
        <div class="hint">タップで答えを見る →</div>
      </div>
      <div class="face back">
        <button class="mark-btn${isMarked?' marked':''}" onclick="event.stopPropagation();toggleMark('${safeQ}')" title="${isMarked?'マーク解除':'マークして後でまとめて見る'}">📌</button>
        <div class="a-title">A. ${d.a}</div>
        <div class="a-body">${d.body}</div>
      </div>
    </div>
  </div>`;
}
filtersEl.addEventListener("click", e=>{
  const btn = e.target.closest(".filter");
  if(!btn) return;
  document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = btn.dataset.filter;
  render();
});
searchEl.addEventListener("input", render);
document.getElementById("shuffle").addEventListener("click", ()=>{
  for(let i=data.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [data[i],data[j]] = [data[j],data[i]];
  }
  render();
  window.scrollTo({top:0,behavior:"smooth"});
});
render();
</script>
