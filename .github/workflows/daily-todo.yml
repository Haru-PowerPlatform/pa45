name: 毎日のTODOメール送信

on:
  schedule:
    # 毎朝 7:30 JST（= UTC 22:30 前日）
    - cron: "30 22 * * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  send-todo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send daily TODO email
        env:
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          BADGE_SENDER:     ${{ secrets.BADGE_SENDER }}
          TODO_RECIPIENT:   ${{ secrets.TODO_RECIPIENT }}
        run: python scripts/daily-todo.py --send
