name: 毎日のTODOメール送信

on:
  # schedule トリガーは停止（2026-05-16 Haruの指示で毎日メールオフ）
  # 再開する場合は下の cron を有効化する
  #   - cron: "30 22 * * *"   # 毎朝 7:30 JST（= UTC 22:30 前日）
  workflow_dispatch:  # 手動実行も可能

jobs:
  send-todo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send daily TODO email
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: python scripts/daily-todo.py --send
