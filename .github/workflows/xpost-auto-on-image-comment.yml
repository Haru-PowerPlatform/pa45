name: Xpost Auto (image comment -> Claude -> update repo)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate X post from image and update repo
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // ---- helpers ----
            const ensureDir = (p) => fs.mkdirSync(p, { recursive: true });
            const fileExists = (p) => { try { fs.accessSync(p); return true; } catch { return false; } };
            const readText = (p) => fs.readFileSync(p, 'utf8');
            const writeText = (p, s) => fs.writeFileSync(p, s, 'utf8');
            const writeBin = (p, buf) => fs.writeFileSync(p, buf);

            const slugify = (s) =>
              (s || "xpost")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 40) || "xpost";

            const extractJson = (text) => {
              // remove code fences if present
              const t = (text || "").trim()
                .replace(/^```json\s*/i, "")
                .replace(/^```\s*/i, "")
                .replace(/```$/i, "")
                .trim();

              // direct parse
              try { return JSON.parse(t); } catch {}

              // try find first {...} block
              const m = t.match(/\{[\s\S]*\}$/);
              if (m) {
                try { return JSON.parse(m[0]); } catch {}
              }
              throw new Error("Claude output is not valid JSON");
            };

            // ---- get issue/comment ----
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const title = issue.title || "";
            const ibody = issue.body || "";
            const cbody = comment.body || "";

            // Target filter (avoid accidental runs)
            const isTarget = /X投稿したい/i.test(title);
            if (!isTarget) {
              core.info("Not target issue. Skip.");
              return;
            }

            // Find image URL (supports multiple GitHub formats)
            const text = ibody + "\n" + cbody;
            const re = /https:\/\/github\.com\/user-attachments\/assets\/\S+|https:\/\/user-images\.githubusercontent\.com\/\S+|https:\/\/private-user-images\.githubusercontent\.com\/\S+/;
            const m = text.match(re);
            const imageUrl = m ? m[0].replace(/\)$/, "") : "";

            if (!imageUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "画像URLが見つかりません🙏 このIssueのコメント欄に画像をドラッグ＆ドロップして投稿してください（テーマは不要。画像から推定します）。"
              });
              return;
            }

            // ---- compute next Vol from data/activities/index.json ----
            let nextVol = 1;
            const idxPath = "data/activities/index.json";
            if (fileExists(idxPath)) {
              try {
                const idx = JSON.parse(readText(idxPath));
                let mx = 0;
                for (const it of (idx.items || [])) {
                  const v = String(it.vol || "");
                  const mm = v.match(/(\d+)/);
                  if (mm) mx = Math.max(mx, parseInt(mm[1], 10));
                }
                nextVol = mx + 1;
              } catch (e) {
                // ignore parse errors; treat as empty
              }
            } else {
              // initialize index.json if missing
              ensureDir("data/activities");
              writeText(idxPath, JSON.stringify({ items: [] }, null, 2));
            }

            // ---- download image ----
            const imgRes = await fetch(imageUrl);
            if (!imgRes.ok) throw new Error(`Failed to download image: ${imgRes.status} ${imgRes.statusText}`);
            const imgBuf = Buffer.from(await imgRes.arrayBuffer());
            const imgB64 = imgBuf.toString('base64');

            // ---- system prompt (prefer repo file, fallback to default) ----
            const sysPath = ".claude/xpost_system.md";
            let systemPrompt = "";
            if (fileExists(sysPath)) {
              systemPrompt = readText(sysPath);
            } else {
              systemPrompt = `あなたはPA45のX投稿文を作るAIです。
必ず次の型で本文を出してください：

📌【Vol.xx】タイトル

（2〜4段落で：何を整理したか／なぜ大事か／よくある落とし穴）
・箇条書きは2〜4行（チェックリスト形式）

保存用にもどうぞ👇
#PowerAutomate #ローコード #PA45

出力はJSONのみ：title, theme, x_main, x_thread(array), alt_text
テーマは画像から推定してOK。`;
            }

            // ---- call Anthropic Claude (vision) ----
            const apiKey = process.env.ANTHROPIC_API_KEY;
            if (!apiKey) throw new Error("ANTHROPIC_API_KEY is missing (Secrets)");

            const payload = {
              model: "claude-3-5-sonnet-latest",
              max_tokens: 1400,
              system: systemPrompt,
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: "image/png", data: imgB64 } },
                  { type: "text", text: `Vol=${nextVol}. 画像からテーマ(theme)を推定し、固定フォーマットでX本文を作ってください。JSONだけで返してください。` }
                ]
              }]
            };

            const claudeRes = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: {
                "content-type": "application/json",
                "x-api-key": apiKey,
                "anthropic-version": "2023-06-01"
              },
              body: JSON.stringify(payload)
            });

            if (!claudeRes.ok) {
              const errText = await claudeRes.text();
              throw new Error(`Claude API error: ${claudeRes.status} ${claudeRes.statusText}\n${errText}`);
            }

            const claudeJson = await claudeRes.json();
            const textParts = (claudeJson.content || []).filter(x => x.type === "text").map(x => x.text).join("");
            const gen = extractJson(textParts);

            const theme = gen.theme || gen.title || "Power Automate tips";
            const slug = slugify(theme);

            // ---- write files into repo ----
            const now = new Date();
            const yyyy = String(now.getFullYear());
            const ymd = `${yyyy}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            const iso = `${yyyy}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            ensureDir(`assets/img/x/${yyyy}`);
            ensureDir("x/drafts");
            ensureDir("data/activities");

            const imgPath = `assets/img/x/${yyyy}/${ymd}-vol${String(nextVol).padStart(2,'0')}-${slug}.png`;
            writeBin(imgPath, imgBuf);

            const draftPath = `x/drafts/${iso}-vol${String(nextVol).padStart(2,'0')}-${slug}.md`;
            let draft = `# X Draft Vol.${String(nextVol).padStart(2,'0')}\n\n`;
            draft += `Theme: ${theme}\n\n`;
            draft += (gen.x_main || "") + "\n\n";
            if (Array.isArray(gen.x_thread) && gen.x_thread.length) {
              draft += "## Thread\n";
              gen.x_thread.forEach((t, i) => { draft += `${i+1}. ${t}\n`; });
              draft += "\n";
            }
            draft += `Image: ${imgPath}\nALT: ${gen.alt_text || ""}\n`;
            writeText(draftPath, draft);

            // update index.json
            let idx = { items: [] };
            try { idx = JSON.parse(readText(idxPath)); } catch {}
            const item = {
              date: iso,
              category: "X投稿",
              vol: `Vol.${String(nextVol).padStart(2,'0')}`,
              theme: theme,
              image: imgPath,
              draft: draftPath
            };
            idx.items = [item, ...(idx.items || [])];
            writeText(idxPath, JSON.stringify(idx, null, 2));

            const activityPath = `data/activities/${iso}-vol${String(nextVol).padStart(2,'0')}-${slug}.json`;
            const activity = { ...item, x_main: gen.x_main || "", x_thread: gen.x_thread || [], alt_text: gen.alt_text || "" };
            writeText(activityPath, JSON.stringify(activity, null, 2));

            // Save generated JSON for debugging
            writeText("gen.json", JSON.stringify(gen, null, 2));

            // ---- comment back to issue ----
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body:
`✅ 画像からテーマ推定→X投稿文生成→画像保存→活動ログ更新まで完了しました。

【推定テーマ】${theme}
【画像保存】${imgPath}
【下書き】${draftPath}

--- X本文 ---
${gen.x_main || ""}

#PowerAutomate #ローコード #PA45`
            });

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/x data/activities/index.json data/activities x/drafts gen.json || true
          git commit -m "Auto: X draft + save image + update activities" || exit 0
          git push
