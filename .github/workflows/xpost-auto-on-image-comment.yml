name: Xpost Auto (image comment -> Claude -> update repo)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  run:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract target + image url
        id: extract
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const issue = context.payload.issue;
            const cbody = context.payload.comment?.body || "";
            const ibody = issue.body || "";
            const text = ibody + "\n" + cbody;

            // 対象Issueを絞る（誤爆防止）：タイトルに「X投稿したい」が含まれるものだけ
            const isTarget = /X投稿したい/i.test(issue.title);

            // 画像URL抽出（GitHubの複数形式に対応）
            const m = text.match(
              /https:\/\/github\.com\/user-attachments\/assets\/\S+|https:\/\/user-images\.githubusercontent\.com\/\S+|https:\/\/private-user-images\.githubusercontent\.com\/\S+/
            );
            const image_url = m ? m[0].replace(/\)$/, "") : "";

            return JSON.stringify({ issue_number: issue.number, isTarget, image_url });

      - name: Stop if not target
        run: |
          python - <<'PY'
          import json
          req=json.loads(r'''${{ steps.extract.outputs.result }}''')
          if not req.get("isTarget"):
            raise SystemExit(0)
          PY

      - name: Ask for image if missing
        uses: actions/github-script@v7
        with:
          script: |
            const req = JSON.parse('${{ steps.extract.outputs.result }}');
            if (req.image_url) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: req.issue_number,
              body: "画像が見つかりません🙏 このIssueに画像をドラッグ＆ドロップしてコメント投稿してください（テーマは不要。画像から推定します）"
            });

      - name: Stop when no image
        run: |
          python - <<'PY'
          import json
          req=json.loads(r'''${{ steps.extract.outputs.result }}''')
          if not req.get("image_url"):
            raise SystemExit(0)
          PY

      - name: Ensure folders
        run: |
          mkdir -p assets/img/x
          mkdir -p data/activities
          mkdir -p x/drafts

      - name: Compute next Vol (from data/activities/index.json)
        id: vol
        run: |
          python - <<'PY'
          import json, os, re
          path="data/activities/index.json"
          idx={"items":[]}
          if os.path.exists(path):
            idx=json.load(open(path,"r",encoding="utf-8"))
          mx=0
          for it in idx.get("items",[]):
            v=str(it.get("vol",""))
            m=re.search(r'(\d+)', v)
            if m: mx=max(mx,int(m.group(1)))
          print(f"VOL={mx+1}")
          PY >> $GITHUB_OUTPUT

      - name: Download image to tmp.png
        run: |
          python - <<'PY'
          import json, urllib.request, pathlib
          req=json.loads(r'''${{ steps.extract.outputs.result }}''')
          data=urllib.request.urlopen(req["image_url"]).read()
          pathlib.Path("tmp.png").write_bytes(data)
          PY

      - name: Call Claude (Anthropic) with image
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PY'
          import os, json, base64, pathlib, requests
          vol=int("${{ steps.vol.outputs.VOL }}")

          system = pathlib.Path(".claude/xpost_system.md").read_text(encoding="utf-8")
          img_b64 = base64.b64encode(pathlib.Path("tmp.png").read_bytes()).decode("utf-8")

          payload={
            "model":"claude-3-5-sonnet-latest",
            "max_tokens":1400,
            "system":system,
            "messages":[
              {"role":"user","content":[
                {"type":"image","source":{"type":"base64","media_type":"image/png","data":img_b64}},
                {"type":"text","text":f"Vol={vol}. 画像からthemeを推定して、JSONで title/theme/x_main/x_thread/alt_text を返してください。"}
              ]}
            ]
          }

          r=requests.post(
            "https://api.anthropic.com/v1/messages",
            headers={
              "content-type":"application/json",
              "x-api-key":os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version":"2023-06-01"
            },
            data=json.dumps(payload)
          )
          r.raise_for_status()
          d=r.json()
          text="".join([c.get("text","") for c in d.get("content",[]) if c.get("type")=="text"])
          pathlib.Path("gen.json").write_text(text, encoding="utf-8")
          PY

      - name: Save image + draft + update activities index
        run: |
          python - <<'PY'
          import json, os, re, datetime, pathlib

          vol=int("${{ steps.vol.outputs.VOL }}")
          today=datetime.date.today()
          y=today.strftime("%Y")
          ymd=today.strftime("%Y%m%d")
          today_iso=today.isoformat()

          raw=pathlib.Path("gen.json").read_text(encoding="utf-8")
          try:
            gen=json.loads(raw)
          except Exception:
            gen={"title":"(parse failed)","theme":"(unknown)","x_main":raw,"x_thread":[],"alt_text":""}

          theme=gen.get("theme") or gen.get("title") or "Power Automate tips"
          slug=re.sub(r'[^a-z0-9]+','-', theme.lower()).strip('-')[:40] or "xpost"

          os.makedirs(f"assets/img/x/{y}", exist_ok=True)
          img_path=f"assets/img/x/{y}/{ymd}-vol{vol:02d}-{slug}.png"
          pathlib.Path(img_path).write_bytes(pathlib.Path("tmp.png").read_bytes())

          os.makedirs("x/drafts", exist_ok=True)
          draft=f"x/drafts/{today_iso}-vol{vol:02d}-{slug}.md"
          with open(draft,"w",encoding="utf-8") as f:
            f.write(f"# X Draft Vol.{vol:02d}\n\nTheme: {theme}\n\n")
            f.write(gen.get("x_main","")+"\n\n")
            if gen.get("x_thread"):
              f.write("## Thread\n")
              for i,t in enumerate(gen["x_thread"],1):
                f.write(f"{i}. {t}\n")
            f.write(f"\nImage: {img_path}\nALT: {gen.get('alt_text','')}\n")

          idx_path="data/activities/index.json"
          idx={"items":[]}
          if os.path.exists(idx_path):
            idx=json.load(open(idx_path,"r",encoding="utf-8"))

          item={
            "date": today_iso,
            "category": "X投稿",
            "vol": f"Vol.{vol:02d}",
            "theme": theme,
            "image": img_path,
            "draft": draft
          }
          idx["items"]=[item]+idx.get("items",[])
          json.dump(idx, open(idx_path,"w",encoding="utf-8"), ensure_ascii=False, indent=2)

          post_path=f"data/activities/{today_iso}-vol{vol:02d}-{slug}.json"
          json.dump({**item,
                    "x_main": gen.get("x_main",""),
                    "x_thread": gen.get("x_thread",[]),
                    "alt_text": gen.get("alt_text","")},
                    open(post_path,"w",encoding="utf-8"), ensure_ascii=False, indent=2)
          PY

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/img/x data/activities/index.json data/activities x/drafts
          git commit -m "Auto: X draft + save image + update activities" || exit 0
          git push

      - name: Comment back to issue
        uses: actions/github-script@v7
        with:
          script: |
            const req = JSON.parse('${{ steps.extract.outputs.result }}');
            const fs = require('fs');
            let out = '';
            try { out = fs.readFileSync('gen.json','utf8'); } catch(e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: req.issue_number,
              body: `✅ 画像からテーマ推定→X投稿文生成→画像保存→活動ログ更新まで完了しました。\n\n\`\`\`\n${out.slice(0, 5000)}\n\`\`\``
            });
``
