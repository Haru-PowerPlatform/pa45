name: Rebuild activities index

on:
  push:
    paths:
      - "data/activities/**"
      - ".github/workflows/rebuild-activities-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate data/meta/activities-index.json
        run: |
          set -euo pipefail
          mkdir -p data/meta
          python3 - <<'PY'
          import json, glob, os
          files = sorted([
              f for f in glob.glob("data/activities/*.json")
              if not os.path.basename(f).startswith("_")
              and os.path.basename(f) != "index.json"
          ])
          with open("data/meta/activities-index.json", "w", encoding="utf-8") as f:
              json.dump(files, f, ensure_ascii=False, indent=2)
          print("Wrote", len(files), "entries")
          PY

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/meta/activities-index.json
          git commit -m "chore: rebuild activities index"
          git push
