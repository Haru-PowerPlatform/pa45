name: X 自動投稿（昼 12:15 / 夕 17:30 JST）

on:
  schedule:
    - cron: "15 3 * * *"   # JST 12:15（UTC 03:15）昼スロット
    - cron: "30 8 * * *"   # JST 17:30（UTC 08:30）夕スロット
  workflow_dispatch:        # 手動実行（テスト用）
    inputs:
      slot:
        description: "投稿スロット"
        required: true
        default: "noon"
        type: choice
        options:
          - noon
          - evening
      dry_run:
        description: "dry-run（投稿せず本文だけ表示）"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: Determine slot from cron schedule
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            # UTC時刻でnoon/eveningを判定
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "03" ]; then
              echo "slot=noon" >> $GITHUB_OUTPUT
            else
              echo "slot=evening" >> $GITHUB_OUTPUT
            fi
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Post to X
        env:
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          DRY="${{ steps.slot.outputs.dry_run }}"
          echo "スロット: $SLOT / dry-run: $DRY"

          if [ "$DRY" = "true" ]; then
            python scripts/post-scheduled-x.py --slot "$SLOT" --dry-run
          else
            python scripts/post-scheduled-x.py --slot "$SLOT"
          fi

      - name: Commit log
        if: steps.slot.outputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/x-posts-log.json || true
          git commit -m "Auto: X投稿ログ更新 [$(date -u '+%Y-%m-%d %H:%M UTC')]" || exit 0
          git push
